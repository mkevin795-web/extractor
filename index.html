<!--
════════════════════════════════════════════════════════════════════════════════
ESTRUCTURA HTML PARA EL HISTORIAL MEJORADO
Ubicación: Dentro de tu index.html, reemplaza la sección del historial con esto
════════════════════════════════════════════════════════════════════════════════
-->

<!-- HISTORIAL MEJORADO -->
<div class="history-wrapper" id="historyWrapper">
  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- PESTAÑAS -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div class="history-tabs">
    <button class="history-tab active" onclick="switchTab(0, this)">
      📋 Historial
    </button>
    <button class="history-tab" onclick="switchTab(1, this)">
      ✅ Procesados hoy
    </button>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- TAB 1: HISTORIAL (Documentos guardados) -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div class="tab-content active" id="tab-historial">

    <!-- Mensaje de estado -->
    <div class="status-message">
      ✓ Modo 24h activo. Las cargas nuevas se seguirán agregando al historial
      hasta que lo desactives o cambie el día.
    </div>

    <!-- Barra de contador -->
    <div class="count-bar">
      <span class="count-left">Documentos guardados hoy</span>
      <span class="count-right" id="historialCount">0 total</span>
    </div>

    <!-- Grid de tarjetas -->
    <div class="history-cards-grid" id="historialGrid">
      <!-- Las tarjetas se inyectan aquí con JavaScript -->
    </div>

    <!-- Paginación -->
    <div class="pagination-container">
      <div class="pagination-dots" id="historialPagination">
        <div class="pagination-dot active"></div>
        <div class="pagination-dot"></div>
        <div class="pagination-dot"></div>
      </div>
    </div>

    <!-- Botones de acción -->
    <div class="history-actions">
      <button onclick="App.actions.showStored()">📁 Mostrar guardados</button>
      <button onclick="App.actions.clearHistory()" style="color: #ef4444;">
        🗑️ Limpiar historial
      </button>
    </div>

  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- TAB 2: PROCESADOS HOY (Desde Google Drive) -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div class="tab-content" id="tab-procesados">

    <!-- Mensaje de estado -->
    <div class="status-message">
      ✓ Últimos procesados desde Google Drive en modo automático (kmendoza)
    </div>

    <!-- Barra de contador -->
    <div class="count-bar">
      <span class="count-left">Procesados en esta sesión</span>
      <span class="count-right" id="procesadosCount">0 archivos</span>
    </div>

    <!-- Grid de tarjetas -->
    <div class="history-cards-grid" id="procesadosGrid">
      <!-- Las tarjetas se inyectan aquí con JavaScript -->
    </div>

    <!-- Paginación -->
    <div class="pagination-container">
      <div class="pagination-dots" id="procesadosPagination">
        <div class="pagination-dot active"></div>
        <div class="pagination-dot"></div>
      </div>
    </div>

    <!-- Botones de acción -->
    <div class="history-actions">
      <button onclick="App.actions.downloadReport()">📥 Descargar reporte</button>
      <button onclick="App.actions.clearProcessed()">🗑️ Limpiar procesados</button>
    </div>

  </div>

</div>

<!--
════════════════════════════════════════════════════════════════════════════════
INSTRUCCIONES DE INTEGRACIÓN

1. Abre tu index.html original

2. Busca la sección donde está el historial actual (probablemente algo como):
   <div class="history-section">
   o
   <div id="history">
   o similar

3. REEMPLAZA completamente esa sección con el HTML de arriba

4. Importante: Los IDs y clases CSS deben coincidir exactamente con:
   - class="history-wrapper"
   - class="history-tabs"
   - class="history-tab"
   - id="historialGrid" y id="procesadosGrid"
   - id="historialCount" y id="procesadosCount"
   - etc.

5. Los funciones onclick deben existir en app.js:
   - switchTab(tabIndex, btnElement)
   - App.actions.showStored()
   - App.actions.clearHistory()
   - App.actions.downloadReport()
   - App.actions.clearProcessed()

6. Si alguna función no existe, crea un stub o reemplaza con noop:
   onclick="console.log('Función no implementada')"

════════════════════════════════════════════════════════════════════════════════
ESTRUCTURA DEL DOM ESPERADA

App.state.storedDocuments = [
  {
    id: "doc-1",
    sourceName: "Mercado Libre - Orden 12345",
    rows: [{ numbers: ["001", "002"] }],
    storedAt: 1672531200000,  // timestamp en ms
    picker: "kmendoza"
  },
  ...
]

App.state.processed = [
  {
    name: "archivo.xlsx",
    processedAt: 1672531200000,
    bulkCount: 5,
    picker: "Automático"
  },
  ...
]

════════════════════════════════════════════════════════════════════════════════
FUNCIONES JAVASCRIPT REQUERIDAS EN app.js:

1. switchTab(tabIndex, btnElement)
   - Cambia la pestaña activa
   - Renderiza el contenido correspondiente

2. renderHistorialTab()
   - Llena el #historialGrid con las tarjetas de App.state.storedDocuments

3. renderProcesadosTab()
   - Llena el #procesadosGrid con las tarjetas de App.state.processed

4. App.actions.showStored()
5. App.actions.clearHistory()
6. App.actions.downloadReport()
7. App.actions.clearProcessed()

Todas estas están documentadas en app-ACTUALIZADO.js

════════════════════════════════════════════════════════════════════════════════
-->
